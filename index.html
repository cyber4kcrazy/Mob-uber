<!DOCTYPE html>
<html>
<head>
  <title>MobMatch Ride</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

 #map {
  height: 70vh;
  width: 100%;
}

    .panel {
      padding: 15px;
    }

    input, button {
      padding: 10px;
      margin: 8px 0;
      width: 100%;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00ff88;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2 style="text-align:center;">🚗 MobMatch Ride</h2>

<div id="map"></div>

<div class="panel">
  <input id="pickup" placeholder="Pickup location">
  <input id="destination" placeholder="Destination">

  <button onclick="requestRide()">Request Ride</button>

  <p id="status"></p>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([6.5244, 3.3792], 13); // Lagos default

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
}).addTo(map);

let marker;

// Get user location
navigator.geolocation.getCurrentPosition((pos) => {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  map.setView([lat, lng], 15);

  marker = L.marker([lat, lng]).addTo(map)
    .bindPopup("You are here")
    .openPopup();
});

function requestRide() {
  document.getElementById("status").innerText =
    "🔍 Finding nearby driver...";

  setTimeout(() => {
    document.getElementById("status").innerText =
      "🚕 Driver assigned! Moving toward you...";

    if (!marker) return;

    let userPos = marker.getLatLng();

    // Fake driver starting point
    let driver = L.marker([
      userPos.lat + 0.01,
      userPos.lng + 0.01
    ]).addTo(map).bindPopup("Driver");

    let steps = 20;
    let i = 0;

    let interval = setInterval(() => {
      if (i >= steps) {
        clearInterval(interval);
        document.getElementById("status").innerText =
          "✅ Driver has arrived!";
        return;
      }

      let lat = driver.getLatLng().lat + (userPos.lat - driver.getLatLng().lat) / 5;
      let lng = driver.getLatLng().lng + (userPos.lng - driver.getLatLng().lng) / 5;

      driver.setLatLng([lat, lng]);

      i++;
    }, 500);

  }, 2000);
}
  document.getElementById("status").innerText =
    "🔍 Finding nearby driver...";

  setTimeout(() => {
    document.getElementById("status").innerText =
      "🚕 Driver assigned! 3 mins away.";
  }, 2000);
}
</script>

</body>
</html>
